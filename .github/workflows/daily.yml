name: Daily CI Run

on:
  schedule:
    - cron: "0 15 * * *"  # 11am ET (UTC-4 EDT)
  workflow_dispatch:        # allow manual trigger for testing

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore snapshots from data branch
        run: |
          git fetch origin data 2>/dev/null || echo "No data branch yet — first run"
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout origin/data -- snapshots/ 2>/dev/null || echo "No snapshots dir yet"
            git checkout origin/data -- data/ 2>/dev/null || echo "No data dir yet"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run daily signals and alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cd src && python run.py --mode daily

      - name: Commit snapshots and events to data branch
        run: |
          git config user.name "ci-tracker"
          git config user.email "ci-tracker@github-actions"

          # Save generated files before switching branches
          mkdir -p /tmp/ci-data
          cp -r snapshots /tmp/ci-data/ 2>/dev/null || true
          cp -r data /tmp/ci-data/ 2>/dev/null || true

          # Switch to or create the data branch
          git fetch origin data 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -b data origin/data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

          # Restore generated files and .gitignore
          cp -r /tmp/ci-data/snapshots . 2>/dev/null || true
          cp -r /tmp/ci-data/data . 2>/dev/null || true
          cp .gitignore /tmp/ci-gitignore 2>/dev/null || true
          git checkout origin/master -- .gitignore 2>/dev/null || cp /tmp/ci-gitignore .gitignore 2>/dev/null || true

          # Ensure data/events.json exists even if no events fired
          mkdir -p data
          [ -f data/events.json ] || echo "[]" > data/events.json

          git add -A
          git add -f snapshots/ 2>/dev/null || true  # force-add gitignored snapshots
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: daily run ${{ github.run_id }}"
            git push origin data
          fi
